<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Directori de radios en directe amb Radio Browser i IPRD">
    <title>Radio Quexulo | Musiques del mon</title>
    <link rel="stylesheet" href="styles.css?v=20260424-1">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Radios de tot arreu</p>
        <h1>Radio Quexulo</h1>
      </div>
      <div class="status-pill" id="apiStatus">Connectant</div>
    </header>

    <main class="app-shell">
      <details class="filter-disclosure" open>
        <summary>Busca i filtra</summary>
        <section class="toolbar" aria-label="Filtres de radio">
          <label class="search-field">
            <span>Cerca</span>
            <input id="searchInput" type="search" placeholder="Nom, ciutat, estil..." autocomplete="off">
          </label>

          <label>
            <span>Pais</span>
            <select id="countrySelect">
              <option value="">Tots</option>
            </select>
          </label>

          <label>
            <span>Idioma</span>
            <select id="languageSelect">
              <option value="">Tots</option>
            </select>
          </label>

          <label>
            <span>Codec</span>
            <select id="codecSelect">
              <option value="">Tots</option>
            </select>
          </label>

          <label>
            <span>Font</span>
            <select id="sourceSelect">
              <option value="all">Totes</option>
              <option value="radio-browser">Radio Browser</option>
              <option value="iprd">IPRD</option>
            </select>
          </label>

          <label>
            <span>Ordre</span>
            <select id="orderSelect">
              <option value="clickcount">Populars</option>
              <option value="votes">Vots</option>
              <option value="name">Nom</option>
              <option value="changetimestamp">Actualitzades</option>
            </select>
          </label>
        </section>

        <section class="quality-row" aria-label="Filtres de qualitat">
          <label class="toggle-field">
            <input id="httpsOnlyInput" type="checkbox">
            <span>Nomes HTTPS</span>
          </label>
          <label class="toggle-field">
            <input id="hideHlsInput" type="checkbox">
            <span>Amaga HLS</span>
          </label>
          <label class="toggle-field">
            <input id="logoOnlyInput" type="checkbox">
            <span>Amb logo</span>
          </label>
          <label class="bitrate-field">
            <span>Bitrate minim</span>
            <input id="minBitrateInput" type="number" min="0" max="512" step="32" placeholder="0">
          </label>
        </section>
      </details>

      <section class="quick-row" aria-label="Accions rapides">
        <button class="chip active" type="button" data-preset="all">Totes</button>
        <button class="chip" type="button" data-preset="favorites">Favorites</button>
        <button class="chip" type="button" data-preset="recent">Recents</button>
        <button class="chip" type="button" data-preset="ca">Catala</button>
        <button class="chip" type="button" data-preset="music">Musica</button>
        <button class="chip" type="button" data-preset="news">Noticies</button>
        <button class="chip" type="button" id="randomButton">Aleatoria</button>
      </section>

      <section class="results-head">
        <div>
          <h2 id="resultTitle">Emissores disponibles</h2>
          <p id="resultMeta">Preparant resultats...</p>
        </div>
        <button class="ghost-button" type="button" id="refreshButton">Actualitza</button>
      </section>

      <section class="station-grid" id="stationGrid" aria-live="polite"></section>

      <div class="load-row">
        <button class="primary-button" type="button" id="loadMoreButton">Carrega mes</button>
      </div>
    </main>

    <aside class="player" aria-label="Reproductor">
      <div class="player-art" id="playerArt">RA</div>
      <div class="player-info">
        <p id="playerName">Cap emissora seleccionada</p>
        <p class="now-playing" id="nowPlaying" hidden></p>
        <div class="player-status">
          <span id="playerMeta">Tria una radio per escoltar-la</span>
          <button class="visualizer-toggle" id="visualizerToggle" type="button" aria-label="Mostra visualitzador">
            <span class="eye-icon" aria-hidden="true"></span>
          </button>
          <button class="tv-toggle" id="tvToggle" type="button" aria-label="Mode TV">
            <span class="tv-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <audio id="audioPlayer" controls preload="none"></audio>
      <section class="visualizer-panel" id="visualizerPanel" hidden aria-label="Visualitzador de so">
        <div class="visualizer-modes">
          <button class="mode-button active" type="button" data-visualizer-mode="bars">Barres</button>
          <button class="mode-button" type="button" data-visualizer-mode="wave">Ona</button>
          <button class="mode-button fullscreen-button" type="button" id="fullscreenVisualizerButton">Pantalla completa</button>
        </div>
        <canvas id="visualizerCanvas" width="960" height="260"></canvas>
      </section>
    </aside>

    <section class="tv-view" id="tvView" hidden aria-label="Mode pantalla gran">
      <div class="tv-backdrop"></div>
      <header class="tv-header">
        <div>
          <p>Radio Quexulo</p>
          <h2 id="tvStationName">Radio</h2>
          <span id="tvStationMeta">Preparant emissora...</span>
        </div>
        <div class="tv-clock" id="tvClock">--:--</div>
      </header>
      <main class="tv-main">
        <div class="tv-logo" id="tvLogo">RQ</div>
        <canvas id="tvCanvas" width="1600" height="780"></canvas>
      </main>
      <footer class="tv-footer">
        <button class="mode-button" type="button" id="tvModeButton">Canvia visual</button>
        <button class="mode-button" type="button" id="exitTvButton">Sortir</button>
      </footer>
    </section>

    <script src="app.js?v=20260424-1"></script>
  </body>
</html>
